<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - Sastrería A&amp;S</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --sidebar-bg:     #d6e3f0;
            --sidebar-active: #c3d5e8;
            --navy:           #1a2744;
            --gold:           #b8962e;
            --topbar-border:  #1a2744;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            color: var(--navy);
            height: 100vh;
            display: flex;
            overflow: auto;
        }

        /* ===== SIDEBAR ===== */
        #sidebar {
            width: 260px; min-width: 260px;
            background-color: var(--sidebar-bg);
            display: flex; flex-direction: column;
            height: 100vh;
            overflow-y: auto; overflow-x: hidden;
            transition: width 0.3s ease, min-width 0.3s ease;
        }
        #sidebar.collapsed { width: 0; min-width: 0; }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1040;
        }

        .sidebar-logo {
            display: flex; justify-content: center; align-items: center;
            padding: 28px 16px 20px;
        }
        .sidebar-logo img { object-fit: contain; }

        .sidebar-nav { flex: 1; list-style: none; padding: 0; margin: 0; }

        .sidebar-nav li a {
            display: flex; align-items: center; gap: 18px;
            padding: 18px 32px;
            color: var(--navy); text-decoration: none;
            font-size: 1.05rem; font-weight: 400;
            transition: background 0.15s;
        }
        .sidebar-nav li a:hover { background-color: var(--sidebar-active); }
        .sidebar-nav li.active a { background-color: var(--sidebar-active); font-weight: 500; }
        .sidebar-nav li a i { font-size: 1.55rem; min-width: 32px; text-align: center; color: var(--navy); }

        /* Submenu "Funciones extra" */
        .submenu-toggle {
            display: flex; align-items: center; gap: 18px;
            padding: 18px 32px;
            color: var(--navy); cursor: pointer;
            font-size: 1.05rem; font-weight: 400;
            user-select: none;
            transition: background 0.15s;
        }
        .submenu-toggle:hover { background-color: var(--sidebar-active); }
        .submenu-toggle i.main-icon { font-size: 1.55rem; min-width: 32px; text-align: center; }
        .submenu-toggle .chevron { margin-left: auto; font-size: 1rem; transition: transform 0.25s; }
        .submenu-toggle.open .chevron { transform: rotate(180deg); }

        .submenu {
            list-style: none; padding: 0; margin: 0;
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .submenu.open { max-height: 200px; }
        .submenu li a {
            padding: 14px 32px 14px 56px;
            font-size: 0.97rem;
        }

        .sidebar-bottom {
            padding: 12px 0 24px;
            border-top: 1px solid rgba(26,39,68,0.12);
            margin-top: auto;
        }

        /* ===== MAIN ===== */
        #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 28px 12px;
            border-bottom: 2.5px solid var(--topbar-border);
            background: #fff; flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 18px; }
        .topbar-left i { font-size: 1.6rem; color: var(--navy); cursor: pointer; }
        .topbar-left .bi-gear-fill { color: var(--gold); font-size: 1.7rem; }
        .topbar-right { display: flex; align-items: center; gap: 14px; }
        .topbar-username { font-size: 1.05rem; font-weight: 500; color: var(--navy); }
        .topbar-avatar {
            width: 46px; height: 46px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--gold);
        }

        /* ===== CONTENT ===== */
        .content-area { flex: 1; overflow-y: auto; padding: 32px 40px 40px; background: #fff; }

        .page-title {
            font-size: 1.6rem; font-weight: 700;
            color: var(--navy); margin-bottom: 28px;
        }

        /* Form labels */
        .field-label {
            font-size: 0.97rem;
            color: var(--navy);
            margin-bottom: 6px;
            display: block;
        }

        /* Form inputs */
        .form-input {
            border: 1.5px solid #ccc;
            border-radius: 6px;
            padding: 11px 14px;
            font-size: 0.97rem;
            color: var(--navy);
            width: 100%;
            outline: none;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--navy); }

        /* Imagen de la sastrería */
        .shop-img {
            width: 100%;
            border-radius: 16px;
            object-fit: cover;
            display: block;
            max-height: 280px;
        }

        /* Botón guardar */
        .btn-guardar {
            background: var(--gold);
            border: none; color: #fff;
            font-weight: 700; font-size: 1rem;
            letter-spacing: 0.04em;
            padding: 14px 40px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-guardar:hover { background: #9a7010; }

        @media (max-width: 767.98px) {
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                z-index: 1050;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                box-shadow: 4px 0 20px rgba(0,0,0,0.2);
            }
            #sidebar.collapsed {
                transform: translateX(0);
                width: 260px;
                min-width: 260px;
            }
            #sidebar.collapsed + .sidebar-backdrop { display: block; }
            .content-area { padding: 20px 16px; }
        }
    </style>
    <script src="js/filtro-color.js"></script>
    <script src="js/zoom.js"></script>
    <script src="js/accesibilidad.js"></script>
    <script src="js/modo-oscuro.js"></script>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
    <div class="sidebar-logo">
        <img src="IMG/LogoA&S.png" alt="A&S Logo" width="110" height="110"
             style="width:250px; height:250px; object-fit:contain;">
    </div>

    <ul class="sidebar-nav">
        <!-- General (activo) -->
        <li class="active">
            <a href="Ajustes.html">
                <i class="bi bi-sliders"></i>
                General
            </a>
        </li>

        <!-- Funciones extra con submenu -->
        <li style="padding:0;">
            <div class="submenu-toggle" id="funcToggle">
                <i class="bi bi-gear-wide-connected main-icon"></i>
                Funciones extra
                <i class="bi bi-chevron-down chevron"></i>
            </div>
            <ul class="submenu" id="funcSubmenu">
                <li><a href="Accesibilidad.html"><i class="bi bi-person-arms-up"></i>Accesibilidad</a></li>
            </ul>
        </li>

        <!-- Zoom y Filtro de color como items directos (igual al mockup) -->
        <li>
            <a href="Zoom.html">
                <i class="bi bi-search"></i>
                Zoom
            </a>
        </li>
        <li>
            <a href="Filtro.html">
                <i class="bi bi-palette"></i>
                Filtro de color
            </a>
        </li>
    </ul>

    <!-- Regresar -->
    <div class="sidebar-bottom">
        <ul class="sidebar-nav" style="margin:0">
            <li>
                <a href="Home.html">
                    <i class="bi bi-box-arrow-in-left"></i>
                    Regresar
                </a>
            </li>
        </ul>
    </div>
</aside>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<!-- MAIN -->
<div id="main">
    <header class="topbar">
        <div class="topbar-left">
            <i class="bi bi-list" id="sidebarToggle" role="button" aria-label="Mostrar u ocultar menú"></i>
            <i class="bi bi-gear-fill"></i>
        </div>
        <div class="topbar-right">
            <span class="topbar-username">Administrador</span>
            <img src="IMG/usuario.png" alt="Avatar" class="topbar-avatar" width="46" height="46" loading="lazy">
        </div>
    </header>

    <main class="content-area">

        <h1 class="page-title">Configuración General</h1>

        <div class="row g-4">

            <!-- Columna izquierda: formulario -->
            <div class="col-lg-7">
                <div class="row g-3">

                    <div class="col-12">
                        <label class="field-label">Nombre de la Empresa</label>
                        <input type="text" class="form-input" value="Sastrería A&s">
                    </div>

                    <div class="col-12">
                        <label class="field-label">Correo de Contacto</label>
                        <input type="email" class="form-input" value="contacto@satreria.com">
                    </div>

                    <div class="col-12">
                        <label class="field-label">Teléfono</label>
                        <input type="tel" class="form-input" value="999 123 456">
                    </div>

                    <div class="col-12">
                        <label class="field-label">Dirección</label>
                        <input type="text" class="form-input" value="Av. Principal 123,Ciudad">
                    </div>

                </div>
            </div>

            <!-- Columna derecha: imagen -->
            <div class="col-lg-5 d-flex align-items-start justify-content-center">
                <img src="IMG/Traje noche.jpeg"
                     onerror="this.src='https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80'"
                     alt="Sastrería A&S"
                     class="shop-img">
            </div>

        </div>

        <!-- Botón guardar -->
        <div class="d-flex justify-content-end mt-4">
            <button class="btn-guardar">Guardar Cambios</button>
        </div>

    </main>
</div>

<script>
    document.getElementById('sidebarToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('collapsed');
    });

    document.getElementById('sidebarBackdrop').addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('collapsed');
    });

    // Submenu Funciones extra
    const funcToggle = document.getElementById('funcToggle');
    const funcSubmenu = document.getElementById('funcSubmenu');
    funcToggle.addEventListener('click', () => {
        funcToggle.classList.toggle('open');
        funcSubmenu.classList.toggle('open');
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

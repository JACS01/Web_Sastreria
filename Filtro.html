<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro de color - Sastrería A&S</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


    <style>
        :root {
            --sidebar-bg:     #d6e3f0;
            --sidebar-active: #c3d5e8;
            --navy:           #1a2744;
            --gold:           #b8962e;
            --topbar-border:  #000000;
        }


        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            color: var(--navy);
            height: 100vh;
            display: flex;
            overflow: auto;
            background: #fff;
        }


        /* ===== SIDEBAR ===== */
        #sidebar {
            width: 260px; min-width: 260px;
            background-color: var(--sidebar-bg);
            display: flex; flex-direction: column;
            height: 100vh;
            overflow-y: auto; overflow-x: hidden;
            transition: width 0.3s ease, min-width 0.3s ease;
        }
        #sidebar.collapsed { width: 0; min-width: 0; }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1040;
        }


        .sidebar-logo {
            display: flex; justify-content: center; align-items: center;
            padding: 28px 16px 20px;
        }
        .sidebar-logo img { object-fit: contain; width: 250px; height: 250px; }


        .sidebar-nav { flex: 1; list-style: none; padding: 0; margin: 0; }


        .sidebar-nav li a {
            display: flex; align-items: center; gap: 18px;
            padding: 18px 32px;
            color: var(--navy); text-decoration: none;
            font-size: 1.05rem; font-weight: 400;
            transition: background 0.15s;
        }
        .sidebar-nav li a:hover { background-color: var(--sidebar-active); }
        .sidebar-nav li.active > a { background-color: var(--sidebar-active); font-weight: 500; }
        .sidebar-nav li a i { font-size: 1.6rem; min-width: 32px; text-align: center; }


        /* Submenu Funciones extra */
        .submenu-toggle {
            display: flex; align-items: center; gap: 18px;
            padding: 18px 32px;
            color: var(--navy); cursor: pointer;
            font-size: 1.05rem; font-weight: 400;
            user-select: none;
            transition: background 0.15s;
        }
        .submenu-toggle:hover { background-color: var(--sidebar-active); }
        .submenu-toggle i.main-icon { font-size: 1.6rem; min-width: 32px; text-align: center; }
        .submenu-toggle .chevron { margin-left: auto; font-size: 1rem; transition: transform 0.25s; }
        .submenu-toggle.open .chevron { transform: rotate(180deg); }


        .submenu {
            list-style: none; padding: 0; margin: 0;
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .submenu.open { max-height: 200px; }
        .submenu li a { padding: 14px 32px 14px 56px; font-size: 0.97rem; }
        .submenu li a i { font-size: 1.4rem; }
        .submenu li.active > a { background-color: var(--sidebar-active); font-weight: 500; }


        .sidebar-bottom {
            padding: 12px 0 24px;
            border-top: 1px solid rgba(26,39,68,0.12);
            margin-top: auto;
        }


        /* ===== MAIN ===== */
        #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }


        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 28px 12px;
            border-bottom: 2.5px solid var(--topbar-border);
            background: #fff; flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 18px; }
        .topbar-left i { font-size: 1.6rem; color: #000; cursor: pointer; }
        .topbar-left .bi-gear-fill { color: var(--gold); font-size: 1.8rem; }
        .topbar-right { display: flex; align-items: center; gap: 14px; }
        .topbar-username { font-size: 1.05rem; font-weight: 500; color: #000; }
        .topbar-avatar {
            width: 46px; height: 46px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--gold);
        }


        /* ===== CONTENT ===== */
        .content-area {
            flex: 1; overflow-y: auto;
            padding: 32px 40px 40px;
            background: #fff;
        }


        .page-title {
            font-size: 1.6rem; font-weight: 700;
            color: #000; margin-bottom: 24px;
        }


        .field-label {
            font-size: 0.97rem;
            color: #000;
            margin-bottom: 6px;
            display: block;
        }


        /* Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #d0d0d0;
            transition: .2s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #ffffff;
            transition: .2s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #4caf50;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }


        /* Radio custom tipo "burbujas" */
        .filter-option {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
            font-size: 0.97rem;
            color: #000;
        }


        .filter-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1.5px solid #444;
            background: #fff;
        }


        .filter-option.active .filter-dot {
            background: #555;
            border-color: #555;
        }


        /* Separador vertical y panel de ejemplo de colores */
        .vertical-divider {
            border-left: 2px solid #000;
            height: 100%;
            min-height: 260px;
        }


        .color-preview-main {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: conic-gradient(
                #f44336 0deg 45deg,
                #ff9800 45deg 90deg,
                #ffeb3b 90deg 135deg,
                #4caf50 135deg 180deg,
                #2196f3 180deg 225deg,
                #3f51b5 225deg 270deg,
                #9c27b0 270deg 315deg,
                #e91e63 315deg 360deg
            );
            margin-bottom: 24px;
        }


        .color-preview-legend {
            width: 210px;
            padding: 16px;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 0 4px rgba(0,0,0,0.06);
            font-size: 0.9rem;
        }


        .color-preview-legend .legend-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1px;
            margin-bottom: 10px;
        }


        .legend-cell {
            width: 18px;
            height: 18px;
        }


        .legend-list span {
            display: block;
        }


        @media (max-width: 991.98px) {
            .vertical-divider {
                display:none;
            }
        }


        @media (max-width: 767.98px) {
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                z-index: 1050;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                box-shadow: 4px 0 20px rgba(0,0,0,0.2);
            }
            #sidebar.collapsed {
                transform: translateX(0);
                width: 260px;
                min-width: 260px;
            }
            #sidebar.collapsed + .sidebar-backdrop { display: block; }
            .content-area { padding: 20px 16px; }
        }
    </style>
    <script src="js/filtro-color.js"></script>
    <script src="js/zoom.js"></script>
    <script src="js/accesibilidad.js"></script>
    <script src="js/modo-oscuro.js"></script>
</head>
<body>


<!-- SIDEBAR -->
<aside id="sidebar">
    <div class="sidebar-logo">
        <img src="IMG/LogoA&S.png" alt="A&S Logo">
    </div>


    <ul class="sidebar-nav">
        <!-- General -->
        <li>
            <a href="Ajustes.html">
                <i class="bi bi-sliders"></i>
                General
            </a>
        </li>


        <!-- Funciones extra (puede tener Accesibilidad) -->
        <li style="padding:0;">
            <div class="submenu-toggle" id="funcToggle">
                <i class="bi bi-gear-wide-connected main-icon"></i>
                Funciones extra
                <i class="bi bi-chevron-down chevron"></i>
            </div>
            <ul class="submenu" id="funcSubmenu">
                <li>
                    <a href="Accesibilidad.html">
                        <i class="bi bi-person-arms-up"></i>
                        Accesibilidad
                    </a>
                </li>
            </ul>
        </li>


        <!-- Zoom -->
        <li>
            <a href="Zoom.html">
                <i class="bi bi-search"></i>
                Zoom
            </a>
        </li>


        <!-- Filtro de color activo -->
        <li class="active">
            <a href="Filtro.html">
                <i class="bi bi-palette"></i>
                Filtro de color
            </a>
        </li>
    </ul>


    <!-- Cerrar sesión -->
    <div class="sidebar-bottom">
        <ul class="sidebar-nav" style="margin:0">
            <li>
                <a href="Home.html">
                    <i class="bi bi-box-arrow-in-left"></i>
                    Regresar
                </a>
            </li>
        </ul>
    </div>
</aside>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<!-- MAIN -->
<div id="main">
    <header class="topbar">
        <div class="topbar-left">
            <i class="bi bi-list" id="sidebarToggle" role="button"
               aria-label="Mostrar u ocultar menú"></i>
            <i class="bi bi-gear-fill"></i>
        </div>
        <div class="topbar-right">
            <span class="topbar-username">Administrador</span>
            <img src="IMG/usuario.png" alt="Avatar" class="topbar-avatar" loading="lazy">
        </div>
    </header>


    <main class="content-area">


        <h1 class="page-title">Filtro de color</h1>


        <div class="row g-4">


            <!-- Columna izquierda: controles -->
            <div class="col-lg-7">


                <!-- Switch activar/desactivar filtro -->
                <div class="mb-4">
                    <span class="field-label mb-2" id="lblEstadoFiltro">Desactivado</span>
                    <label class="switch">
                        <input type="checkbox" id="chkFiltro">
                        <span class="slider"></span>
                    </label>
                </div>


                <!-- Opciones de filtro -->
                <div class="mt-2" id="filterOptions">


                    <label class="filter-option" data-tipo="deuteranopia">
                        <span class="filter-dot"></span>
                        <span>Rojo - verde (verde suave, deuteranopía)</span>
                    </label>


                    <label class="filter-option" data-tipo="protanopia">
                        <span class="filter-dot"></span>
                        <span>Rojo - verde (rojo suave, protanopía)</span>
                    </label>


                    <label class="filter-option" data-tipo="tritanopia">
                        <span class="filter-dot"></span>
                        <span>Azul - amarillo (tritanopía)</span>
                    </label>


                    <label class="filter-option" data-tipo="grises">
                        <span class="filter-dot"></span>
                        <span>Escala de grises</span>
                    </label>
                </div>


            </div>


            <!-- Columna derecha: divisor + círculos de color -->
            <div class="col-lg-5 d-flex align-items-start justify-content-center">


                <div class="d-flex w-100 justify-content-evenly">


                    <div class="vertical-divider me-4"></div>


                    <div class="d-flex flex-column align-items-center">
                        <!-- Círculo de colores principal -->
                        <div class="color-preview-main mb-4"></div>


                        <!-- Cuadro con matriz + nombres de colores -->
                        <div class="color-preview-legend">
                            <div class="legend-grid mb-2">
                                <div class="legend-cell" style="background:#f44336;"></div>
                                <div class="legend-cell" style="background:#ff9800;"></div>
                                <div class="legend-cell" style="background:#ffeb3b;"></div>
                                <div class="legend-cell" style="background:#4caf50;"></div>
                                <div class="legend-cell" style="background:#2196f3;"></div>
                                <div class="legend-cell" style="background:#9c27b0;"></div>


                                <div class="legend-cell" style="background:#e57373;"></div>
                                <div class="legend-cell" style="background:#ffb74d;"></div>
                                <div class="legend-cell" style="background:#fff176;"></div>
                                <div class="legend-cell" style="background:#81c784;"></div>
                                <div class="legend-cell" style="background:#64b5f6;"></div>
                                <div class="legend-cell" style="background:#ba68c8;"></div>
                            </div>


                            <div class="legend-list">
                                <span>Rojo</span>
                                <span>Naranja</span>
                                <span>Amarillo</span>
                                <span>Verde</span>
                                <span>Azul</span>
                                <span>Púrpura</span>
                            </div>
                        </div>
                    </div>


                </div>


            </div>
        </div>


    </main>
</div>


<script>
    // Sidebar toggle
    document.getElementById('sidebarToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('collapsed');
    });

    document.getElementById('sidebarBackdrop').addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('collapsed');
    });


    // Submenu Funciones extra
    const funcToggle  = document.getElementById('funcToggle');
    const funcSubmenu = document.getElementById('funcSubmenu');
    funcToggle.addEventListener('click', () => {
        funcToggle.classList.toggle('open');
        funcSubmenu.classList.toggle('open');
    });


    // ===== Filtro de color: conexión con ASFiltroColor (js/filtro-color.js) =====
    const options       = document.querySelectorAll('.filter-option');
    const chkFiltro      = document.getElementById('chkFiltro');
    const lblEstadoFiltro = document.getElementById('lblEstadoFiltro');

    function marcarOpcionActiva(tipo) {
        options.forEach(o => o.classList.toggle('active', o.dataset.tipo === tipo));
    }

    function actualizarUI() {
        const estado = ASFiltroColor.estado();
        chkFiltro.checked = estado.activo;
        lblEstadoFiltro.textContent = estado.activo ? 'Activado' : 'Desactivado';
        marcarOpcionActiva(estado.tipo);
    }

    // Estado inicial al cargar la página (según lo guardado en localStorage)
    actualizarUI();

    // Seleccionar un tipo de filtro: lo activa y lo aplica de inmediato
    options.forEach(opt => {
        opt.addEventListener('click', () => {
            const tipo = opt.dataset.tipo;
            ASFiltroColor.activar(tipo);
            actualizarUI();
        });
    });

    // Switch general: activa/desactiva el filtro seleccionado
    chkFiltro.addEventListener('change', () => {
        if (chkFiltro.checked) {
            const tipoActual = ASFiltroColor.estado().tipo;
            ASFiltroColor.activar(tipoActual);
        } else {
            ASFiltroColor.desactivar();
        }
        actualizarUI();
    });
</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registrar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --brand-blue: #0b2340;
            --soft-blue: #e6eef6;
            --gold: #b98812;
        }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: var(--brand-blue); background: #fff; }
        .left-side { background: var(--soft-blue); }
        .brand-logo { height: 200px; width: auto; }
        .brand-title { font-family: Georgia, 'Times New Roman', serif; font-size: 1.6rem; color: var(--brand-blue); font-weight: 700; margin-top: 8px; }
        .brand-sub { font-family: 'Brush Script MT', serif; color: var(--brand-blue); font-size: 0.9rem; letter-spacing: 0.6px; }
        .hero-image { width: 100%; height: auto; object-fit: cover; display: block; }
        .form-control { border-radius: 8px; box-shadow: none; padding: 14px; }
        .input-group-text { background: #fff; border: 0; }
        .btn-primary-gold { background: var(--gold); border: 0; color: #fff; font-weight: 700; border-radius: 8px; padding: 14px 30px; }
        .btn-primary-gold:hover { opacity: 0.9; color: #fff; }

        @media (min-width: 992px) {
            .left-side { min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 40px; }
        }
        @media (max-width: 991.98px) {
            .left-side { padding: 18px 12px 6px; }
            .brand-logo { height: 120px; width: auto; display: block; margin: 6px auto; }
            .brand-title { font-size: 1.4rem; text-align: center; }
            .brand-sub { text-align: center; }
            .hero-image { border-radius: 8px; margin-top: 14px; }
        }
        @media (max-width: 575.98px) {
            .form-container { padding: 24px 16px !important; }
        }
    </style>
    <script src="js/filtro-color.js"></script>
    <script src="js/zoom.js"></script>
    <script src="js/accesibilidad.js"></script>
    <script src="js/modo-oscuro.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row g-0">

            <!-- Columna izquierda: logo + imagen -->
            <div class="col-12 col-lg-6 left-side d-flex flex-column align-items-center">
                <div class="w-100 text-center pt-3 d-none d-lg-block">
                    <img src="IMG/LogoA&S.png" alt="A&S" class="brand-logo">
                    <div class="brand-title">SASTRERÍA A&amp;S</div>
                    <div class="brand-sub">ELEGANCIA HECHA A TU MEDIDA</div>
                </div>
                <div class="w-100 px-3 px-lg-5 py-3">
                    <img src="IMG/sing%20up.png" alt="Registro de usuario" class="hero-image mx-auto d-block">
                </div>
            </div>

            <!-- Columna derecha: formulario de registro -->
            <div class="col-12 col-lg-6 d-flex align-items-center justify-content-center">
                <div class="w-100 form-container" style="max-width: 520px; padding: 40px;">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold">CREAR CUENTA</h2>
                        <p class="text-muted">Completa los datos para registrarte</p>
                    </div>

                    <form id="formRegistro" novalidate>

                        <!-- Nombre completo -->
                        <div class="mb-3">
                            <label class="form-label visually-hidden" for="nombre">Nombre Completo</label>
                            <div class="input-group">
                                <span class="input-group-text">👤</span>
                                <input id="nombre" type="text" class="form-control" placeholder="Nombre Completo" required>
                                <div class="invalid-feedback">Ingresa tu nombre completo.</div>
                            </div>
                        </div>

                        <!-- Correo electrónico -->
                        <div class="mb-3">
                            <label class="form-label visually-hidden" for="email">Correo Electrónico</label>
                            <div class="input-group">
                                <span class="input-group-text">✉️</span>
                                <input id="email" type="email" class="form-control" placeholder="Correo Electrónico" required>
                                <div class="invalid-feedback">Ingresa un correo válido.</div>
                            </div>
                        </div>

                        <!-- Teléfono -->
                        <div class="mb-3">
                            <label class="form-label visually-hidden" for="telefono">Teléfono</label>
                            <div class="input-group">
                                <span class="input-group-text">📞</span>
                                <input id="telefono" type="tel" class="form-control" placeholder="Teléfono (opcional)">
                            </div>
                        </div>

                        <!-- Contraseña -->
                        <div class="mb-3">
                            <label class="form-label visually-hidden" for="password">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text">🔒</span>
                                <input id="password" type="password" class="form-control" placeholder="Contraseña" required minlength="6">
                                <button class="btn btn-outline-secondary" type="button" id="togglePass" title="Mostrar contraseña">👁️</button>
                                <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
                            </div>
                        </div>

                        <!-- Confirmar contraseña -->
                        <div class="mb-4">
                            <label class="form-label visually-hidden" for="confirmPassword">Confirmar Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text">🔒</span>
                                <input id="confirmPassword" type="password" class="form-control" placeholder="Confirmar Contraseña" required>
                                <button class="btn btn-outline-secondary" type="button" id="toggleConfirm" title="Mostrar contraseña">👁️</button>
                                <div class="invalid-feedback" id="confirmError">Las contraseñas no coinciden.</div>
                            </div>
                        </div>

                        <!-- Botón registrar -->
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary-gold">REGISTRARSE</button>
                        </div>

                        <p class="text-center text-muted">
                            ¿Ya tienes una cuenta?
                            <a href="iniciarSesion.html" style="color: var(--gold); text-decoration: underline;">Inicia Sesión</a>
                        </p>

                    </form>
                </div>
            </div>

        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script>
    // Mostrar/ocultar contraseña
    document.getElementById('togglePass').addEventListener('click', function () {
        const pw = document.getElementById('password');
        pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('toggleConfirm').addEventListener('click', function () {
        const pw = document.getElementById('confirmPassword');
        pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    // Validación del formulario
    document.getElementById('formRegistro').addEventListener('submit', function (e) {
        e.preventDefault();
        const form = this;
        const password = document.getElementById('password');
        const confirm  = document.getElementById('confirmPassword');

        // Validar que las contraseñas coincidan
        if (password.value !== confirm.value) {
            confirm.classList.add('is-invalid');
            document.getElementById('confirmError').textContent = 'Las contraseñas no coinciden.';
            return;
        } else {
            confirm.classList.remove('is-invalid');
        }

        if (!form.checkValidity()) {
            form.classList.add('was-validated');
            return;
        }

        // Registro exitoso → redirigir a inicio de sesión
        window.location.href = 'iniciarSesion.html';
    });
</script>
</body>
</html>
